name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore FitnessCenter.sln

      - name: Build
        run: dotnet build FitnessCenter.sln --no-restore -c Release

      - name: Run tests
        run: dotnet test FitnessCenter.Tests.csproj --no-build -c Release --verbosity normal
